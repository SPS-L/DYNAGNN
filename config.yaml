# Configuration for DYNAGNN scripts.

dynagnn:
  version: 1.2

dynawo:
  path: "path to myEnvDynawo.sh"

data:
  path: "path to data folder"

simulation:
  event_time: 
  initialization_duration:  # total Dynawo run time (s) per OP before contingency simulations, to find a steady state solution for the initial operating point

network:
  country_filter: []

kpi:
  window_sec: 
  step_sec: 
  class_bins:
    voltage:
      cuts:  # raw KPI thresholds (ascending), e.g. [1e-6, 2.25e-5, 3e-4, 5.625e-4]
    spower:
      cuts:  # raw KPI thresholds (ascending)

model:
  num_classes: 

training:
  epochs:
  patience:
  batch_size:
  split_mode:
  seed:
  training:
  validation:
  testing:

  # Fixed loss construction and output-decoding settings.
  pair_aware:
    classification_weight: 
    regression_weight:  
    inactive_gate_weight: 
    ordinal_weight: 
    class_weight_mode: 
    gate_pos_weight_mode: 
    gate_threshold:
    epsilon: 
    selection_output: 

optuna:
  n_trials:
  study_name:  # folder under data/training/ and data/model/
  hparams:
    hidden_dim:
      type: categorical
      choices: 
    node_id_dim:
      type: categorical
      choices: 
    contingency_id_dim:
      type: categorical
      choices: 
    type_dim:
      type: categorical
      choices: 
    pair_dim:
      type: categorical
      choices: 
    num_gnn_layers:
      type: int
      low: 
      high: 
    decoder_hidden_dim:
      type: categorical
      choices: 
    dropout:
      type: float
      low: 
      high: 
    lr:
      type: float
      low: 
      high:
      log: true
    weight_decay:
      type: float
      low: 
      high: 
      log: true

inference:
  initialization_duration:  # total Dynawo run time (s) before constructing the graph, to find a steady state solution for the initial operating point