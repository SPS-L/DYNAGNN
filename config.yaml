# Configuration for DYNAGNN scripts.

dynagnn:
  version: 1.11

dynawo:
  path: "path to myEnvDynawo.sh"

data:
  path: "path to data folder"

simulation:
  event_time: 
  initialization_duration:  # total Dynawo run time (s) per OP before contingency simulations, to find a steady state solution for the initial operating point

network:
  country_filter: []

kpi:
  window_sec: 
  step_sec: 
  class_bins:
    voltage:
      cuts:  # raw KPI thresholds (ascending), e.g. [1e-7, 7.5e-7, 7.5e-6, 1.5e-5]
    spower:
      cuts:  # raw KPI thresholds (ascending)

model:
  # Use gat_coral for the legacy implementation.
  architecture: pair_aware_gine
  num_classes: 
  pair_aware:
    hidden_dim: 128
    node_id_dim: 24
    contingency_id_dim: 32
    type_dim: 8
    pair_dim: 32
    op_context_embedding_dim: 32
    num_gnn_layers: 3
    decoder_hidden_dim: 256
    dropout: 0.15

training:
  epochs: 
  patience: 
  batch_size: 
  split_mode: 
  seed: 
  training: 
  validation: 
  testing: 
  high_class_threshold: 
  selection_f1_weight:     # composite score: high_recall + w*f1 - w*loss
  selection_loss_weight: 

  pair_aware:
    op_context_mode: none
    lr: 0.0002
    weight_decay: 0.00001
    classification_weight: 1.0
    regression_weight: 0.30
    inactive_gate_weight: 0.20
    ordinal_weight: 0.10
    class_weight_mode: sqrt_inverse
    gate_pos_weight_mode: balanced
    gate_threshold: 0.50
    epsilon: 1.0e-10
    selection_output: auto

optuna:
  n_trials: 
  hparams:
    hidden_dim:
      type: categorical
      choices: 
    num_layers:
      type: int
      low: 
      high: 
    hidden_channels:
      type: categorical
      choices: 
    num_heads:
      type: categorical
      choices: 
    dropout:
      type: float
      low: 
      high: 
    num_gnn_layers:
      type: int
      low: 
      high: 
    lr:
      type: float
      low: 
      high: 
      log: true
    weight_decay:
      type: float
      low: 
      high: 
      log: true
    under_penalty_lambda:
      type: float
      low: 
      high: 
    coral_prediction_threshold:
      type: float
      low: 
      high: 

inference:
  initialization_duration:  # total Dynawo run time (s) before constructing the graph, to find a steady state solution for the initial operating point